<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — 360° Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #c1002a;
    --accent-light: #fdf0f2;
    --bg: #fafaf8;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    text-align: center;
    padding: 2rem;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%; right: -20%;
    width: 70vw; height: 70vw;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
    pointer-events: none;
  }
  .wrapper { position: relative; z-index: 1; max-width: 500px; animation: rise 1s ease-out; }
  .check {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c1002a, #e0334e);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem;
    box-shadow: 0 4px 20px rgba(193,0,42,.25);
    animation: pulse 2s ease-in-out infinite;
  }
  .check svg { width: 36px; height: 36px; }
  h1 {
    font-family: var(--font-display);
    font-size: 2.5rem;
    font-weight: 600;
    margin-bottom: .75rem;
  }
  p { font-size: .95rem; color: var(--text-muted); font-weight: 300; line-height: 1.7; margin-bottom: 1.5rem; }
  .footer { font-size: .75rem; color: var(--text-muted); opacity: .5; margin-top: 2rem; }
  @keyframes rise { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Thank You</h1>
  <p>Your 360° feedback has been submitted successfully. Your honest observations are incredibly valuable for my personal and professional development.</p>
  <p class="footer">360° Feedback Survey · TH Nürnberg Georg Simon Ohm</p>
</div>
</body>
</html>
